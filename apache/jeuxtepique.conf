<VirtualHost *:80>
    ServerName jeuxtepique.local
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/jeuxtepique/public

    SetEnv APP_ENV production
    SetEnv APP_DEBUG false
    SetEnv APP_URL http://jeuxtepique.local
    SetEnv DB_HOST 127.0.0.1
    SetEnv DB_PORT 3306
    SetEnv DB_DATABASE jeuxtepique
    SetEnv DB_USERNAME jeuxtepique_user
    SetEnv DB_PASSWORD ChangeMe_StrongPassword_2026!

    <Directory /var/www/jeuxtepique/public>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    Alias /assets/ /var/www/jeuxtepique/assets/
    <Directory /var/www/jeuxtepique/assets>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/jeuxtepique/app>
        Require all denied
    </Directory>

    <Directory /var/www/jeuxtepique/config>
        Require all denied
    </Directory>

    <Directory /var/www/jeuxtepique/sql>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/jeuxtepique_error.log
    CustomLog ${APACHE_LOG_DIR}/jeuxtepique_access.log combined
</VirtualHost>
